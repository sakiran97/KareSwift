<div class="toast-container">
  <div
    *ngFor="let toast of toasts"
    class="toast"
    [class.visible]="toast.visible"
    [class.persistent]="toast.persistent"
    [class.info]="toast.type === 'info'"
    [class.success]="toast.type === 'success'"
    [class.warning]="toast.type === 'warning'"
    [class.error]="toast.type === 'error'"
  >
    <span class="toast-icon">
      <svg *ngIf="toast.type === 'info'" xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T800-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-320Z"/></svg>
      <svg *ngIf="toast.type === 'success'" xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor"><path d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T800-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-400Z"/></svg>
      <svg *ngIf="toast.type === 'error'" xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T800-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-320Z"/></svg>
    </span>
    <div class="toast-body">
      <span class="toast-message">{{ toast.message }}</span>
      <div class="toast-actions" *ngIf="toast.actions?.length">
        <button
          *ngFor="let action of toast.actions"
          class="toast-btn"
          (click)="$event.stopPropagation(); onAction(toast, action); dismiss(toast)"
        >{{ action.label }}</button>
      </div>
    </div>
    <button class="toast-close" (click)="dismiss(toast)">&times;</button>
  </div>
</div>
