<div class="create-container">
  <h1>Create Technician</h1>
  <p class="subtitle">Register a new technician account</p>

  <div *ngIf="message" class="message-banner" [class.success]="createdTechnician">
    {{ message }}
  </div>

  <div *ngIf="createdTechnician" class="success-card">
    <p><strong>Name:</strong> {{ createdTechnician.name }}</p>
    <p><strong>Email:</strong> {{ createdTechnician.email }}</p>
    <p><strong>Technician ID:</strong> <code>{{ createdTechnician.technicianId }}</code></p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="create-form">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" formControlName="name" placeholder="John Doe" />
      <div *ngIf="form.get('name')?.touched && form.get('name')?.invalid" class="error">
        Name is required (min 2 chars).
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="tech@doorstep.com" />
      <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="error">
        Valid email is required.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Min 6 characters" />
      <div *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="error">
        Password must be at least 6 characters.
      </div>
    </div>

    <button type="submit" [disabled]="form.invalid || loading" class="btn-submit">
      <span *ngIf="!loading">Create Technician</span>
      <div *ngIf="loading" class="spinner"></div>
    </button>
  </form>
</div>
