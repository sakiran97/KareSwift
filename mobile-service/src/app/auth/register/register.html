<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <div class="logo-badge">
        <svg xmlns="http://www.w3.org/2000/svg" height="28" viewBox="0 -960 960 960" width="28" fill="currentColor">
          <path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-240v-32q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q30 15 47 43.5T800-272v32q0 33-23.5 56.5T720-160H240q-33 0-56.5-23.5T160-240Zm80 0h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/>
        </svg>
      </div>
      <h2>Create Account</h2>
      <p class="subtitle">Join us to manage your device repair requests</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div *ngIf="errorMessage" class="error-banner mb-3">{{ errorMessage }}</div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="John Doe"
            [class.invalid]="registerForm.get('name')?.touched && registerForm.get('name')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid" class="validation-error">
          Name is required (min 2 characters).
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@gmail.com"
            [class.invalid]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="validation-error">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number <span class="optional">(optional)</span></label>
        <div class="input-wrapper">
          <input
            id="phone"
            type="tel"
            formControlName="phone"
            placeholder="9876543210"
            [class.invalid]="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid" class="validation-error">
          Phone must be a valid 10-digit number.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Min 6 characters"
            [class.invalid]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="validation-error">
          Password must be at least 6 characters.
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <div *ngIf="isLoading" class="spinner"></div>
      </button>

      <div class="social-separator">
        <span>or sign up with</span>
      </div>

      <button type="button" class="btn-google" (click)="signUpWithGoogle()" [disabled]="isLoading">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/auth/login">Sign in here</a></p>
    </div>
  </div>
</div>
