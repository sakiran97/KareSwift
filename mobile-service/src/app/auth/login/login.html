<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-badge">
        <svg xmlns="http://www.w3.org/2000/svg" height="28" viewBox="0 -960 960 960" width="28" fill="currentColor">
          <path d="M280-40q-33 0-56.5-23.5T200-120v-720q0-33 23.5-56.5T280-920h400q33 0 56.5 23.5T760-840v720q0 33-23.5 56.5T680-40H280Zm0-120v40h400v-40H280Zm0-80h400v-480H280v480Zm0-560h400v-40H280v40Zm200 680q17 0 28.5-11.5T520-120q0-17-11.5-28.5T480-160q-17 0-28.5 11.5T440-120q0 17 11.5 28.5T480-80ZM280-160v40-40Z"/>
        </svg>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your email to receive a verification code</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@gmail.com"
            [readonly]="otpRequested"
            [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="validation-error">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group" *ngIf="otpRequested">
        <label for="otp">Enter 6-Digit OTP</label>
        <div class="input-wrapper">
          <input
            id="otp"
            type="text"
            formControlName="otp"
            placeholder="••••••"
            maxLength="6"
            [class.invalid]="loginForm.get('otp')?.touched && loginForm.get('otp')?.invalid"
          />
          <span class="focus-border"></span>
        </div>
        <div *ngIf="loginForm.get('otp')?.touched && loginForm.get('otp')?.invalid" class="validation-error">
          OTP must be exactly 6 digits.
        </div>
      </div>

      <button 
        *ngIf="!otpRequested"
        type="button" 
        [disabled]="loginForm.get('email')?.invalid || isLoading" 
        (click)="onRequestOtp()" 
        class="btn-submit"
      >
        <span *ngIf="!isLoading">Send OTP</span>
        <div *ngIf="isLoading" class="spinner"></div>
      </button>

      <button 
        *ngIf="otpRequested"
        type="submit" 
        [disabled]="loginForm.invalid || isLoading" 
        class="btn-submit"
      >
        <span *ngIf="!isLoading">Verify & Sign In</span>
        <div *ngIf="isLoading" class="spinner"></div>
      </button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Sign up here</a></p>
      <p class="technician-link"><a routerLink="/technician/login">Technician? Sign in with Tech ID</a></p>
    </div>
  </div>
</div>
