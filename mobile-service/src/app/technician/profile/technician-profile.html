<div class="profile-container">
  <header class="page-header">
    <h1>My Profile</h1>
  </header>

  <div *ngIf="loading" class="loading-state"><div class="spinner"></div></div>

  <div *ngIf="profile && !loading" class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        {{ (profile.name || 'T')[0] }}
      </div>
      <div>
        <h2>{{ profile.name }}</h2>
        <p class="technician-id">{{ profile.technicianId }}</p>
        <p class="role-badge">Technician</p>
      </div>
    </div>

    <div *ngIf="message" class="message-banner" [class.success]="message.includes('success')">
      {{ message }}
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="save()" class="profile-form">
      <div class="form-group">
        <label for="name">Display Name</label>
        <div class="input-wrapper">
          <input id="name" type="text" formControlName="name" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <p class="readonly-value">{{ profile.email }}</p>
      </div>

      <div class="form-group" *ngIf="profile.phone">
        <label>Phone</label>
        <p class="readonly-value">{{ profile.phone }}</p>
      </div>

      <button type="submit" [disabled]="profileForm.invalid || saving" class="btn-save">
        <span *ngIf="!saving">Save Changes</span>
        <div *ngIf="saving" class="spinner"></div>
      </button>
    </form>
  </div>
</div>
