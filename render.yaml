services:
  # 1. Managed Redis (Required for Caching & WebSockets)
  - type: redis
    name: kareswift-redis
    plan: free
    ipAllowList: [] # Blank means internal connections only (secure)

  # 2. NestJS Backend API
  - type: web
    name: kareswift-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard from Supabase (Transaction pooler)
      - key: DIRECT_URL
        sync: false # Set this in Render Dashboard from Supabase (Session pooler)
      - key: REDIS_URL
        fromService:
          type: redis
          name: kareswift-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false # Add if you want actual emails sent
      - key: GMAIL_PASS
        sync: false # Add if you want actual emails sent

  # 3. Customer & Technician App (Angular/Ionic PWA)
  - type: web
    name: kareswift-mobile
    env: static
    rootDir: mobile-service
    buildCommand: npm install && npm run build
    staticPublishPath: ./www
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
    routes:
      # Proxy API requests to the backend (Replaces proxy.conf.json in production)
      - type: rewrite
        source: /api/*
        destination: https://kareswift-backend.onrender.com/api/*
      # Proxy WebSocket requests
      - type: rewrite
        source: /sse/*
        destination: https://kareswift-backend.onrender.com/sse/*
      # Fallback for Angular SPA Routing
      - type: rewrite
        source: /*
        destination: /index.html

  # 4. Admin Dashboard (Standalone Angular)
  - type: web
    name: kareswift-admin
    env: static
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/admin-dashboard/browser
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
    routes:
      # Proxy API requests to the backend
      - type: rewrite
        source: /api/*
        destination: https://kareswift-backend.onrender.com/api/*
      # Fallback for Angular SPA Routing
      - type: rewrite
        source: /*
        destination: /index.html
