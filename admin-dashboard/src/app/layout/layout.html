<div class="admin-wrapper" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar glass-panel">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-logo" style="background: none; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px;">
          <img src="logo.svg" alt="KareSwift Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <span class="brand-text">KareSwift Admin</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
          <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="nav-icon">
          <!-- Home Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Z"/>
          </svg>
        </span>
        <span class="nav-text">Stats Overview</span>
      </a>

      <a routerLink="/admin/kyc-review" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <!-- Shield/ID Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="m480-120-156-62q-83-33-123.5-103T160-440v-240l320-120 320 120v240q0 85-40.5 155T636-182L480-120Z"/>
          </svg>
        </span>
        <span class="nav-text">KYC Verification</span>
      </a>

      <a routerLink="/admin/shop-review" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <!-- Store/Map Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="M240-200h80v-280H160v200q0 33 23.5 56.5T240-200Zm160 0h360q33 0 56.5-23.5T840-280v-200H320v400h80Zm-240-360h600l-60-120H180l-60 120Z"/>
          </svg>
        </span>
        <span class="nav-text">Shop Verification</span>
      </a>

      <a routerLink="/admin/technicians" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <!-- Users Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="M160-200v-80q0-58 41-99t99-41q23 0 44 6t41 18q-36 43-53.5 95.5T314-200H160Zm540 0q-18-59-35.5-111.5T611-407q20-12 41-18t44-6q58 0 99 41t41 99v80H700Zm-220 0H314v-46q0-46 32-78t78-32q23 0 45 8.5t39 25.5l56-56q-37-37-88.5-56T424-400q-73 0-124.5 51.5T248-224v24h232Zm-56-320q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35Z"/>
          </svg>
        </span>
        <span class="nav-text">Technicians</span>
      </a>

      <a routerLink="/admin/config" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <!-- Settings Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="m370-80-16-128q-25-10-48.5-24.5T260-267l-119 50-70-122 102-78q-2-12-3-23t-1-23q0-12 1-23t3-23L71-665l70-122 119 50q21-20 44.5-34.5T354-800l16-128h140l16 128q25 10 48.5 24.5T620-733l119-50 70 122-102 78q2 12 3 23t1 23q0 12-1 23t-3 23l102 78-70 122-119-50q-21 20-44.5 34.5T526-160l-16 128H370Zm110-280q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Z"/>
          </svg>
        </span>
        <span class="nav-text">App Configuration</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile" *ngIf="user">
        <div class="avatar">
          {{ user.name.slice(0, 2).toUpperCase() }}
        </div>
        <div class="user-info">
          <div class="name">{{ user.name }}</div>
          <div class="role">Administrator</div>
        </div>
      </div>
      
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/>
          </svg>
        </span>
        <span class="nav-text">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="main-content">
    <header class="top-bar glass-panel">
      <button class="menu-toggle" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
          <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
        </svg>
      </button>
      <div class="page-title">
        <h1>Administrative Dashboard</h1>
      </div>
      <div class="system-status">
        <span class="status-indicator online"></span>
        <span class="status-label">System Active</span>
      </div>
    </header>

    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
